<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de Progressão de Acordes Ultra Pro (Bugfix)</title>
<style>
  :root{
    --card:#1a1d24;
    --accent:#7c5cff;
    --accent2:#22d3ee;
    --text:#f2f2f5;
    --muted:#9aa0ab;
    --border:#2a2e38;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    background:linear-gradient(160deg,#0f1115,#171a21);
    color:var(--text);
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:24px 16px;
  }
  .app{ width:100%; max-width:460px; }
  h1{ font-size:1.4rem; text-align:center; margin-bottom:4px; }
  p.subtitle{ text-align:center; color:var(--muted); font-size:0.85rem; margin:0 0 24px; }
  .card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:16px;
    padding:20px;
    margin-bottom:16px;
  }
  label{ display:block; font-size:0.8rem; color:var(--muted); margin:14px 0 6px; }
  label:first-child{ margin-top:0; }
  select{
    width:100%; padding:12px; border-radius:10px;
    border:1px solid var(--border); background:#12151c; color:var(--text);
    font-size:1rem; appearance:none; -webkit-appearance:none;
  }
  select:focus{ outline:none; border-color:var(--accent); }
  
  .checkbox-group{
    margin-top:16px;
    padding:12px;
    background:#12151c;
    border-radius:10px;
    border:1px solid var(--border);
  }
  .checkbox-group legend{
    font-size:0.8rem;
    color:var(--muted);
    padding:0 4px;
  }
  .checkbox-item{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:0.85rem;
    margin-top:8px;
    cursor:pointer;
  }
  .checkbox-item input{ accent-color:var(--accent); cursor:pointer; }

  button#gerar{
    width:100%; margin-top:22px; padding:15px; border:none; border-radius:12px;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    color:#fff; font-size:1.05rem; font-weight:600; cursor:pointer;
    transition:transform .12s ease, opacity .12s ease;
  }
  button#gerar:active{ transform:scale(0.97); opacity:0.9; }
  #resultado{ text-align:center; }
  .label{ font-size:0.88rem; color:var(--muted); margin-bottom:10px; }
  .chords{ display:flex; flex-wrap:wrap; justify-content:center; gap:8px; margin-bottom:10px; }
  .chord{
    background:#12151c; border:1px solid var(--border); border-radius:10px;
    padding:10px 14px; font-size:1.1rem; font-weight:700; min-width:52px; text-align:center;
    cursor:pointer; transition:border-color 0.2s;
  }
  .chord:hover{ border-color:var(--accent2); }
  .roman{ font-size:0.75rem; color:var(--muted); margin-bottom:12px; }
  .empty{ color:var(--muted); font-size:0.9rem; padding:20px 0; }
  .acoes{ display:flex; gap:8px; justify-content:center; flex-wrap:wrap; }
  .acoes button{
    font-size:0.8rem; padding:8px 12px; border-radius:8px; border:1px solid var(--border);
    background:#12151c; color:var(--text); cursor:pointer;
  }
  .acoes button:active{ transform:scale(0.97); }
  .tabs{ display:flex; gap:8px; border-bottom:1px solid var(--border); margin-bottom:12px; }
  .tabs button{
    flex:1; border:none; background:none; padding:8px; font-size:0.85rem;
    color:var(--muted); border-bottom:2px solid transparent; cursor:pointer;
  }
  .tabs button.ativo{ color:var(--text); border-bottom-color:var(--accent); }
  .item-lista{
    display:flex; align-items:center; justify-content:space-between;
    padding:8px 10px; border:1px solid var(--border); border-radius:8px;
    margin-bottom:6px; cursor:pointer; background:#12151c;
  }
  .item-lista:hover{ border-color:var(--accent); }
  .item-lista .info{ font-size:0.8rem; }
  .item-lista .sub{ color:var(--muted); font-size:0.7rem; display:block; }
  .item-lista .icone{ color:var(--muted); font-size:1rem; }
  .vazio{ font-size:0.8rem; color:var(--muted); text-align:center; padding:10px 0; }
  footer{ text-align:center; color:var(--muted); font-size:0.75rem; margin-top:20px; }
</style>
</head>
<body>
<div class="app">
  <h1>🎸 Gerador de Progressão Ultra</h1>
  <p class="subtitle">Escolha estilo, escala e recursos avançados para compor!</p>

  <div class="card">
    <label for="estilo">Estilo Musical</label>
    <select id="estilo">
      <option value="pop">Pop</option>
      <option value="rock">Rock</option>
      <option value="jazz">Jazz</option>
      <option value="blues">Blues</option>
      <option value="bossa">Bossa Nova / MPB</option>
      <option value="samba">Samba / Pagode</option>
      <option value="lofi">Lo-Fi / Chill</option>
      <option value="reggae">Reggae</option>
      <option value="metal">Metal</option>
      <option value="gospel">Gospel</option>
      <option value="folk">Folk</option>
      <option value="indie">Indie</option>
      <option value="britpop">Britpop</option>
      <option value="grunge">Grunge</option>
      <option value="mpb_romantica">MPB Romântica</option>
      <option value="bluesrock">Blues Rock</option>
    </select>

    <label for="escala">Escala / Modo</label>
    <select id="escala">
      <option value="maior">Maior (Jônio)</option>
      <option value="menor">Menor (Eólio)</option>
      <option value="menor_harmonica">Menor Harmônica</option>
      <option value="menor_melodica">Menor Melódica</option>
      <option value="dorico">Modo Dórico</option>
      <option value="mixolidio">Modo Mixolídio</option>
      <option value="penta_maior">Pentatônica Maior</option>
      <option value="penta_menor">Pentatônica Menor</option>
      <option value="blues_escala">Escala de Blues</option>
    </select>

    <label for="tom">Tom (Tônica)</label>
    <select id="tom">
      <option>C</option><option>C#</option><option>D</option><option>D#</option>
      <option>E</option><option>F</option><option>F#</option><option>G</option>
      <option>G#</option><option>A</option><option>A#</option><option>B</option>
    </select>

    <label for="qtd">Quantidade de Acordes</label>
    <select id="qtd">
      <option value="2">2 (Vamp / Loop)</option>
      <option value="4" selected>4</option>
      <option value="6">6</option>
      <option value="8">8</option>
      <option value="12">12</option>
    </select>

    <fieldset class="checkbox-group">
      <legend>Recursos Avançados</legend>
      <label class="checkbox-item">
        <input type="checkbox" id="chk-inversoes" checked> Inversões de Acordes (C/E, G/B)
      </label>
      <label class="checkbox-item">
        <input type="checkbox" id="chk-emprestimo" checked> Empréstimo Harmônico (iv, ♭VI, ♭VII)
      </label>
      <label class="checkbox-item">
        <input type="checkbox" id="chk-dominantes" checked> Dominantes Secundários (V7/X)
      </label>
    </fieldset>

    <button id="gerar">🎲 Gerar Progressão</button>
  </div>

  <div class="card" id="resultado">
    <div class="empty">Clique em "Gerar" para começar 🎶</div>
  </div>
  
  <div class="card" id="campoHarmonico"></div>

  <div class="card">
    <div class="tabs">
      <button id="tab-historico" class="ativo">Histórico</button>
      <button id="tab-favoritos">Favoritos</button>
    </div>
    <div id="lista-historico"></div>
    <div id="lista-favoritos" style="display:none;"></div>
  </div>

  <footer>Inspirações ilimitadas para suas composições.</footer>
</div>

<script>
const NOTAS = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const NOTAS_BEMOL = ['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];

const FREQUENCIAS = {
  'C': 261.63, 'C#': 277.18, 'Db': 277.18, 'D': 293.66, 'D#': 311.13, 'Eb': 311.13,
  'E': 329.63, 'F': 349.23, 'F#': 369.99, 'Gb': 369.99, 'G': 392.00,
  'G#': 415.30, 'Ab': 415.30, 'A': 440.00, 'A#': 466.16, 'Bb': 466.16, 'B': 493.88
};

const ESCALAS = {
  maior: [
    {grau:0, qual:''},{grau:2, qual:'m'},{grau:4, qual:'m'},{grau:5, qual:''},
    {grau:7, qual:''},{grau:9, qual:'m'},{grau:11, qual:'dim'}
  ],
  menor: [
    {grau:0, qual:'m'},{grau:2, qual:'dim'},{grau:3, qual:''},{grau:5, qual:'m'},
    {grau:7, qual:'m'},{grau:8, qual:''},{grau:10, qual:''}
  ],
  menor_harmonica: [
    {grau:0, qual:'m'},{grau:2, qual:'dim'},{grau:3, qual:'aug'},{grau:5, qual:'m'},
    {grau:7, qual:''},{grau:8, qual:''},{grau:11, qual:'dim'}
  ],
  menor_melodica: [
    {grau:0, qual:'m'},{grau:2, qual:'m'},{grau:3, qual:'aug'},{grau:5, qual:''},
    {grau:7, qual:''},{grau:9, qual:'dim'},{grau:11, qual:'dim'}
  ],
  dorico: [
    {grau:0, qual:'m'},{grau:2, qual:'m'},{grau:3, qual:''},{grau:5, qual:''},
    {grau:7, qual:'m'},{grau:9, qual:'dim'},{grau:10, qual:''}
  ],
  mixolidio: [
    {grau:0, qual:''},{grau:2, qual:'m'},{grau:4, qual:'dim'},{grau:5, qual:''},
    {grau:7, qual:'m'},{grau:9, qual:'m'},{grau:10, qual:''}
  ],
  penta_maior: [
    {grau:0, qual:''},{grau:2, qual:'m'},{grau:4, qual:'m'},{grau:7, qual:''},{grau:9, qual:'m'}
  ],
  penta_menor: [
    {grau:0, qual:'m'},{grau:3, qual:''},{grau:5, qual:'m'},{grau:7, qual:'m'},{grau:10, qual:''}
  ],
  blues_escala: [
    {grau:0, qual:'7'},{grau:3, qual:''},{grau:5, qual:'m'},{grau:6, qual:'dim'},{grau:7, qual:'7'},{grau:10, qual:''}
  ]
};

const ROMANOS = {
  maior: ['I','ii','iii','IV','V','vi','vii°'],
  menor: ['i','ii°','III','iv','v','VI','VII'],
  menor_harmonica: ['i','ii°','III+','iv','V','VI','vii°'],
  menor_melodica: ['i','ii','III+','IV','V','vi°','vii°'],
  dorico: ['i','ii','III','IV','v','vi°','VII'],
  mixolidio: ['I','ii','iii°','IV','v','vi','♭VII'],
  penta_maior: ['I','ii','iii','V','vi'],
  penta_menor: ['i','III','iv','v','VII'],
  blues_escala: ['I7','III','iv','♭v°','V7','♭VII']
};

const EXTENSOES = {
  jazz:   {'':'maj7', 'm':'m7', 'dim':'m7b5', 'aug':'maj7#5'},
  bossa:  {'':'maj7', 'm':'m7', 'dim':'m7b5'},
  samba:  {'':'6', 'm':'m7', 'dim':'m7b5'},
  lofi:   {'':'maj7', 'm':'m9', 'dim':'m7b5'},
  gospel: {'':'maj7', 'm':'m7', 'dim':'m7b5'},
  blues:  {'':'7', 'm':'m7', 'dim':'dim7'}
};

const BLUES_8  = [0,0,2,0,3,2,0,3];
const BLUES_12 = [0,0,0,0,2,2,0,0,3,2,0,3];

function nota(indiceBase, semitons){
  return NOTAS[(indiceBase + semitons + 120) % 12];
}

function gerarAcorde(tomIndex, grauInfo, estilo){
  if (!grauInfo) return '';
  
  const raiz = nota(tomIndex, grauInfo.grau);
  let sufixo = grauInfo.qual;
  const ext = EXTENSOES[estilo];

  if (ext && Math.random() < 0.7 && ext[grauInfo.qual] !== undefined){
    sufixo = ext[grauInfo.qual];
  }

  if (estilo === 'indie' && grauInfo.qual === '' && Math.random() < 0.30){
    sufixo = ['add9','sus2'][Math.floor(Math.random()*2)];
  }
  if (estilo === 'britpop' && grauInfo.qual === '' && Math.random() < 0.30){
    sufixo = ['sus2','sus4'][Math.floor(Math.random()*2)];
  }
  if (estilo === 'reggae' && grauInfo.qual === '' && Math.random() < 0.30){
    sufixo = '6';
  }
  if (estilo === 'metal' && Math.random() < 0.50){
    sufixo = '5';
  }
  if (estilo === 'mpb_romantica' && grauInfo.qual === '' && Math.random() < 0.40){
    sufixo = ['maj7','6','9'][Math.floor(Math.random()*3)];
  }

  return raiz + sufixo;
}

// --- RECURSOS AVANÇADOS CORRIGIDOS ---

function aplicarInversao(acorde){
  if (acorde.includes('/') || acorde.includes('5')) return acorde;
  
  const match = acorde.match(/^[A-G][#b]?/);
  if (!match) return acorde;

  const raiz = match[0];
  let idxRaiz = NOTAS.indexOf(raiz);
  if (idxRaiz === -1) idxRaiz = NOTAS_BEMOL.indexOf(raiz);

  const ehMenor = acorde.includes('m') && !acorde.includes('maj');
  const semitonsTerca = ehMenor ? 3 : 4;
  
  // Usa notação enarmônica bemolizada para terças menores (ex: Eb em vez de D#)
  const terca = ehMenor ? NOTAS_BEMOL[(idxRaiz + semitonsTerca) % 12] : NOTAS[(idxRaiz + semitonsTerca) % 12];
  return `${acorde}/${terca}`;
}

function aplicarEmprestimoHarmonico(tomIndex, escala){
  if (escala !== 'maior') return null;

  const opcoes = [
    { roman: 'iv', semitons: 5, sufixo: 'm' },     // iv menor (ex: Fm em C)
    { roman: '♭VI', semitons: 8, sufixo: '' },     // ♭VI maior (ex: Ab em C)
    { roman: '♭VII', semitons: 10, sufixo: '' }    // ♭VII maior (ex: Bb em C)
  ];

  const esc = opcoes[Math.floor(Math.random() * opcoes.length)];
  const raiz = NOTAS_BEMOL[(tomIndex + esc.semitons) % 12];
  return { acorde: raiz + esc.sufixo, roman: esc.roman };
}

function gerarDominanteSecundario(acordeAlvo){
  const match = acordeAlvo.match(/^[A-G][#b]?/);
  if (!match) return null;

  const raizAlvo = match[0];
  let idxAlvo = NOTAS.indexOf(raizAlvo);
  if(idxAlvo === -1) idxAlvo = NOTAS_BEMOL.indexOf(raizAlvo);

  // Dominante fica uma 5ª justa acima do acorde-alvo (7 semitons)
  const raizDom = NOTAS[(idxAlvo + 7) % 12];
  return { acorde: raizDom + '7', roman: 'V7' };
}

function gerarRoman(idxGrau, escala){
  const arrayRomanos = ROMANOS[escala] || ROMANOS.maior;
  return arrayRomanos[idxGrau] || '';
}

function gerarCampoHarmonico(tomIndex, escala){
  const graus = ESCALAS[escala] || ESCALAS.maior;
  return graus.map(grauInfo => {
    const raiz = nota(tomIndex, grauInfo.grau);
    return raiz + grauInfo.qual;
  });
}

function gerarSequenciaDegraus(estilo, qtd, tamanhoEscala){
  if (estilo === 'blues'){
    if (qtd <= 8) return BLUES_8.map(x => x % tamanhoEscala).slice(0, qtd);
    return BLUES_12.map(x => x % tamanhoEscala).slice(0, qtd > 12 ? 12 : qtd);
  }

  const progressosComuns = {
    pop: [[0,4,5,3], [5,3,0,4], [0,5,3,4], [3,0,4,5]],
    rock: [[0,4,3,0], [5,3,0,4], [4,3,0,0], [0,3,4,0]],
    folk: [[0,4,5,0], [5,3,0,4], [0,5,3,4]],
    gospel: [[0,5,1,4], [3,4,0,5], [0,1,4,0]],
    jazz: [[1,4,0,5], [2,5,1,4], [5,1,4,0]],
    bossa: [[0,1,4,0], [5,1,4,0], [3,1,4,0]],
    samba: [[0,5,1,4], [1,4,0,5], [0,3,1,4]],
    lofi: [[1,4,0,5], [3,4,0,5], [0,5,1,4]],
    reggae: [[0,3,0,4], [0,4,3,4], [0,5,3,4]],
    metal: [[0,5,3,4], [0,1,0,5], [0,6,5,3]],
    indie: [[5,3,0,4], [0,4,5,3], [3,0,5,4]],
    britpop: [[0,4,5,3], [0,3,4,0], [5,3,0,4]],
    grunge: [[0,5,3,4], [5,4,3,4], [0,3,5,4]],
    mpb_romantica: [[0,5,1,4], [5,1,4,0], [3,1,4,0]],
    bluesrock: [[0,0,3,0], [0,3,0,4]]
  };

  const base = progressosComuns[estilo] || progressosComuns.pop;
  const modelo = base[Math.floor(Math.random() * base.length)];
  const seq = [];

  while (seq.length < qtd){
    seq.push(...modelo.map(idx => idx % tamanhoEscala));
  }

  return seq.slice(0, qtd);
}

// ---- Sintetizador Web Audio API (Tratamento Fiel de Extensões) ----
let audioCtx = null;
function tocarAcorde(nomeAcorde){
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  
  const notaBaseMatch = nomeAcorde.match(/^[A-G][#b]?/);
  if(!notaBaseMatch) return;
  
  const notaBase = notaBaseMatch[0];
  const freqBase = FREQUENCIAS[notaBase] || 261.63;
  
  // Tríades básicas
  let intervalos = [0, 4, 7]; 
  if(nomeAcorde.includes('m') && !nomeAcorde.includes('maj')) intervalos = [0, 3, 7];
  if(nomeAcorde.includes('dim') || nomeAcorde.includes('m7b5')) intervalos = [0, 3, 6];
  if(nomeAcorde.includes('aug')) intervalos = [0, 4, 8];
  if(nomeAcorde.includes('5')) intervalos = [0, 7];

  // Adiciona extensões ao som sintetizado
  if (nomeAcorde.includes('maj7')) intervalos.push(11);
  else if (nomeAcorde.includes('7')) intervalos.push(10);
  if (nomeAcorde.includes('m9') || nomeAcorde.includes('add9') || nomeAcorde.includes('9')) intervalos.push(14);
  if (nomeAcorde.includes('6')) intervalos.push(9);

  intervalos.forEach(semitons => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    
    osc.type = 'triangle';
    osc.frequency.value = freqBase * Math.pow(2, semitons / 12);
    
    gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.2);
    
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    
    osc.start();
    osc.stop(audioCtx.currentTime + 1.2);
  });
}

function tocarProgressao(acordes){
  acordes.forEach((acorde, index) => {
    setTimeout(() => {
      tocarAcorde(acorde);
    }, index * 900);
  });
}

// ---- Histórico e Favoritos ----
const LS_HIST = 'progressoes_historico_v4';
const LS_FAV = 'progressoes_favoritos_v4';
function carregar(chave){ try{ return JSON.parse(localStorage.getItem(chave)) || []; }catch(e){ return []; } }
function salvar(chave,dados){ localStorage.setItem(chave, JSON.stringify(dados)); }

let historico = carregar(LS_HIST);
let favoritos = carregar(LS_FAV);

function idDe(item){ return item.tom+'|'+item.escala+'|'+item.estilo+'|'+item.acordes.join(','); }
function ehFavorito(item){ return favoritos.some(f => idDe(f)===idDe(item)); }

// Renderização segura contra XSS usando DOM nativo
function renderResultado(item){
  const resDiv = document.getElementById('resultado');
  resDiv.textContent = ''; // Limpa conteúdo anterior seguro

  const label = document.createElement('div');
  label.className = 'label';
  label.textContent = `Progressão em ${item.tom} ${item.escala} — ${item.estilo} (${item.acordes.length} acordes)`;

  const chordsDiv = document.createElement('div');
  chordsDiv.className = 'chords';

  item.acordes.forEach(a => {
    const chord = document.createElement('div');
    chord.className = 'chord';
    chord.textContent = a;
    chord.addEventListener('click', () => tocarAcorde(a));
    chordsDiv.appendChild(chord);
  });

  const romanDiv = document.createElement('div');
  romanDiv.className = 'roman';
  romanDiv.textContent = item.romanos.join(' - ');

  const acoes = document.createElement('div');
  acoes.className = 'acoes';

  const btnTocar = document.createElement('button');
  btnTocar.textContent = '▶ Ouvir';
  btnTocar.onclick = () => tocarProgressao(item.acordes);

  const btnCopiar = document.createElement('button');
  btnCopiar.textContent = '📋 Copiar';
  btnCopiar.onclick = () => {
    navigator.clipboard.writeText(item.acordes.join(' - '));
    btnCopiar.textContent = '✅ Copiado';
    setTimeout(() => { btnCopiar.textContent = '📋 Copiar'; }, 1500);
  };

  const btnFav = document.createElement('button');
  btnFav.textContent = ehFavorito(item) ? '⭐ Favoritado' : '☆ Favoritar';
  btnFav.onclick = () => {
    if (ehFavorito(item)){
      favoritos = favoritos.filter(f => idDe(f)!==idDe(item));
    } else {
      favoritos.unshift(item);
    }
    salvar(LS_FAV, favoritos);
    renderResultado(item);
    renderListas();
  };

  acoes.appendChild(btnTocar);
  acoes.appendChild(btnCopiar);
  acoes.appendChild(btnFav);

  resDiv.appendChild(label);
  resDiv.appendChild(chordsDiv);
  resDiv.appendChild(romanDiv);
  resDiv.appendChild(acoes);
}

function linhaItem(item, mostrarRemover){
  const div = document.createElement('div');
  div.className = 'item-lista';

  const info = document.createElement('div');
  info.className = 'info';

  const mainSpan = document.createElement('span');
  mainSpan.textContent = item.acordes.join(' - ');

  const subSpan = document.createElement('span');
  subSpan.className = 'sub';
  subSpan.textContent = `${item.tom} ${item.escala} · ${item.estilo}`;

  info.appendChild(mainSpan);
  info.appendChild(subSpan);

  const icone = document.createElement('span');
  icone.className = 'icone';
  icone.textContent = mostrarRemover ? '✕' : (ehFavorito(item) ? '⭐' : '☆');

  icone.addEventListener('click', (e) => {
    e.stopPropagation();
    if (mostrarRemover){
      favoritos = favoritos.filter(f => idDe(f)!==idDe(item));
    } else {
      if (ehFavorito(item)){
        favoritos = favoritos.filter(f => idDe(f)!==idDe(item));
      } else {
        favoritos.unshift(item);
      }
    }
    salvar(LS_FAV, favoritos);
    renderListas();
    renderResultado(item);
  });

  div.appendChild(info);
  div.appendChild(icone);
  div.addEventListener('click', () => renderResultado(item));
  return div;
}

function renderListas(){
  const listaHist = document.getElementById('lista-historico');
  const listaFav = document.getElementById('lista-favoritos');
  listaHist.textContent = '';
  listaFav.textContent = '';

  if (historico.length === 0){
    const vazio = document.createElement('div');
    vazio.className = 'vazio';
    vazio.textContent = 'Nenhuma progressão gerada ainda.';
    listaHist.appendChild(vazio);
  } else {
    historico.slice(0,10).forEach(item => listaHist.appendChild(linhaItem(item, false)));
  }

  if (favoritos.length === 0){
    const vazio = document.createElement('div');
    vazio.className = 'vazio';
    vazio.textContent = 'Nenhum favorito ainda.';
    listaFav.appendChild(vazio);
  } else {
    favoritos.forEach(item => listaFav.appendChild(linhaItem(item, true)));
  }
}

document.getElementById('tab-historico').addEventListener('click', () => {
  document.getElementById('lista-historico').style.display = 'block';
  document.getElementById('lista-favoritos').style.display = 'none';
  document.getElementById('tab-historico').classList.add('ativo');
  document.getElementById('tab-favoritos').classList.remove('ativo');
});
document.getElementById('tab-favoritos').addEventListener('click', () => {
  document.getElementById('lista-favoritos').style.display = 'block';
  document.getElementById('lista-historico').style.display = 'none';
  document.getElementById('tab-favoritos').classList.add('ativo');
  document.getElementById('tab-historico').classList.remove('ativo');
});

document.getElementById('gerar').addEventListener('click', () => {
  const estilo = document.getElementById('estilo').value;
  const escala = document.getElementById('escala').value;
  const tom = document.getElementById('tom').value;
  const qtd = parseInt(document.getElementById('qtd').value, 10);
  
  const permitirInversoes = document.getElementById('chk-inversoes').checked;
  const permitirEmprestimo = document.getElementById('chk-emprestimo').checked;
  const permitirDominantes = document.getElementById('chk-dominantes').checked;

  const tomIndex = NOTAS.indexOf(tom);
  const escalaGraus = ESCALAS[escala] || ESCALAS.maior;

  const sequencia = gerarSequenciaDegraus(estilo, qtd, escalaGraus.length);
  
  let acordes = [];
  let romanos = [];

  for(let i = 0; i < sequencia.length; i++){
    if(acordes.length >= qtd) break;

    const idx = sequencia[i];
    let acorde = gerarAcorde(tomIndex, escalaGraus[idx], estilo);
    let roman = gerarRoman(idx, escala);

    const rand = Math.random();

    // Dominantes Secundários (Apenas insere se HOUVER ESPAÇO para ele e o acorde de resolução)
    if(permitirDominantes && i > 0 && rand < 0.20 && (acordes.length + 2 <= qtd) && !acordes[acordes.length-1].includes('7')){
      const domSec = gerarDominanteSecundario(acorde);
      if(domSec){
        acordes.push(domSec.acorde);
        romanos.push(`V7/${roman}`);
      }
    }

    // Empréstimo Harmônico
    if(permitirEmprestimo && rand > 0.80 && escala === 'maior'){
      const emp = aplicarEmprestimoHarmonico(tomIndex, escala);
      if(emp){
        acorde = emp.acorde;
        roman = emp.roman;
      }
    }

    // Inversões (Slash Chords)
    if(permitirInversoes && rand > 0.50 && rand <= 0.75){
      acorde = aplicarInversao(acorde);
    }

    acordes.push(acorde);
    romanos.push(roman);
  }

  const campo = gerarCampoHarmonico(tomIndex, escala);
  const item = { estilo, escala, tom, acordes, romanos, ts: Date.now() };
  
  historico.unshift(item);
  historico = historico.slice(0,10);
  salvar(LS_HIST, historico);

  renderResultado(item);

  // Exibição didática adequada para pentatônicas/blues vs escalas normais
  const campoDiv = document.getElementById('campoHarmonico');
  campoDiv.textContent = '';
  
  const tituloCampo = document.createElement('div');
  tituloCampo.className = 'label';
  tituloCampo.textContent = escala.includes('penta') || escala.includes('blues') 
    ? `Notas / Acordes da Escala (${escala})` 
    : `Campo Harmônico (${escala})`;
  
  const chordsCampoDiv = document.createElement('div');
  chordsCampoDiv.className = 'chords';
  campo.forEach(a => {
    const chord = document.createElement('div');
    chord.className = 'chord';
    chord.textContent = a;
    chord.onclick = () => tocarAcorde(a);
    chordsCampoDiv.appendChild(chord);
  });

  campoDiv.appendChild(tituloCampo);
  campoDiv.appendChild(chordsCampoDiv);

  renderListas();
});

renderListas();
</script>
