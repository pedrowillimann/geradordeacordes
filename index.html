<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de Progressão de Acordes</title>
<style>
  :root{
    --card:#1a1d24;
    --accent:#7c5cff;
    --accent2:#22d3ee;
    --text:#f2f2f5;
    --muted:#9aa0ab;
    --border:#2a2e38;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    background:linear-gradient(160deg,#0f1115,#171a21);
    color:var(--text);
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:24px 16px;
  }
  .app{ width:100%; max-width:420px; }
  h1{ font-size:1.4rem; text-align:center; margin-bottom:4px; }
  p.subtitle{ text-align:center; color:var(--muted); font-size:0.85rem; margin:0 0 24px; }
  .card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:16px;
    padding:20px;
    margin-bottom:16px;
  }
  label{ display:block; font-size:0.8rem; color:var(--muted); margin:14px 0 6px; }
  label:first-child{ margin-top:0; }
  select{
    width:100%; padding:12px; border-radius:10px;
    border:1px solid var(--border); background:#12151c; color:var(--text);
    font-size:1rem; appearance:none; -webkit-appearance:none;
  }
  select:focus{ outline:none; border-color:var(--accent); }
  button#gerar{
    width:100%; margin-top:22px; padding:15px; border:none; border-radius:12px;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    color:#fff; font-size:1.05rem; font-weight:600; cursor:pointer;
    transition:transform .12s ease, opacity .12s ease;
  }
  button#gerar:active{ transform:scale(0.97); opacity:0.9; }
  #resultado{ text-align:center; }
  #resultado .label{ font-size:0.8rem; color:var(--muted); margin-bottom:10px; }
  .chords{ display:flex; flex-wrap:wrap; justify-content:center; gap:8px; margin-bottom:6px; }
  .chord{
    background:#12151c; border:1px solid var(--border); border-radius:10px;
    padding:10px 14px; font-size:1.15rem; font-weight:700; min-width:52px; text-align:center;
  }
  .roman{ font-size:0.75rem; color:var(--muted); margin-top:14px; }
  .empty{ color:var(--muted); font-size:0.9rem; padding:20px 0; }
  footer{ text-align:center; color:var(--muted); font-size:0.75rem; margin-top:20px; }
</style>
</head>
<body>
<div class="app">
  <h1>🎸 Gerador de Progressão</h1>
  <p class="subtitle">Escolha o estilo, escala, tom e quantidade — depois clique em Gerar</p>

  <div class="card">
    <label for="estilo">Estilo Musical</label>
    <select id="estilo">
      <option value="pop">Pop</option>
      <option value="rock">Rock</option>
      <option value="jazz">Jazz</option>
      <option value="blues">Blues</option>
      <option value="bossa">Bossa Nova / MPB</option>
      <option value="gospel">Gospel</option>
      <option value="folk">Folk / Sertanejo</option>
    </select>

    <label for="escala">Escala</label>
    <select id="escala">
      <option value="maior">Maior</option>
      <option value="menor">Menor</option>
    </select>

    <label for="tom">Tom (Tônica)</label>
    <select id="tom">
      <option>C</option><option>C#</option><option>D</option><option>D#</option>
      <option>E</option><option>F</option><option>F#</option><option>G</option>
      <option>G#</option><option>A</option><option>A#</option><option>B</option>
    </select>

    <label for="qtd">Quantidade de Acordes</label>
    <select id="qtd">
      <option value="4">4</option>
      <option value="6">6</option>
      <option value="8">8</option>
      <option value="12">12</option>
    </select>

    <button id="gerar">🎲 Gerar Progressão</button>
  </div>

  <div class="card" id="resultado">
    <div class="empty">Clique em "Gerar" para começar 🎶</div>
  </div>

  <footer>Cada clique gera uma progressão diferente para o estilo escolhido.</footer>
</div>

<script>
const NOTAS = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

const ESCALAS = {
  maior: [
    {grau:0,  qual:''},
    {grau:2,  qual:'m'},
    {grau:4,  qual:'m'},
    {grau:5,  qual:''},
    {grau:7,  qual:''},
    {grau:9,  qual:'m'},
    {grau:11, qual:'dim'}
  ],
  menor: [
    {grau:0,  qual:'m'},
    {grau:2,  qual:'dim'},
    {grau:3,  qual:''},
    {grau:5,  qual:'m'},
    {grau:7,  qual:'m'},
    {grau:8,  qual:''},
    {grau:10, qual:''}
  ]
};

const ROMANOS_MAIOR = ['I','ii','iii','IV','V','vi','vii°'];
const ROMANOS_MENOR = ['i','ii°','III','iv','v','VI','VII'];

const EXTENSOES = {
  jazz:   {'':'maj7', 'm':'m7', 'dim':'m7b5'},
  bossa:  {'':'maj7', 'm':'m7', 'dim':'m7b5'},
  gospel: {'':'maj7', 'm':'m7', 'dim':'m7b5'},
  blues:  {'':'7', 'm':'m7', 'dim':'dim7'}
};

// Tabelas de transição: para cada grau atual, lista de [proximoGrau, peso]
const TRANSICOES = {
  pop:    {0:[[3,3],[4,3],[5,3],[1,1]], 1:[[4,4],[3,2],[0,1]], 2:[[5,3],[3,2],[0,1]], 3:[[4,4],[0,3],[1,1]], 4:[[0,5],[5,3],[3,1]], 5:[[3,4],[4,3],[1,2],[0,1]], 6:[[0,5],[4,2]]},
  rock:   {0:[[3,4],[4,3],[5,2]], 1:[[4,3],[0,2]], 2:[[5,3],[0,2]], 3:[[0,4],[4,4],[5,1]], 4:[[0,5],[3,3]], 5:[[3,4],[4,3],[0,1]], 6:[[0,5]]},
  jazz:   {0:[[1,4],[5,2],[3,2],[2,1]], 1:[[4,6],[6,1]], 2:[[5,4],[1,2]], 3:[[4,3],[1,2],[0,1]], 4:[[0,5],[5,3],[1,1]], 5:[[1,4],[4,2],[2,2]], 6:[[0,4],[4,2]]},
  bossa:  {0:[[1,4],[5,3],[3,2]], 1:[[4,6]], 2:[[5,4],[1,2]], 3:[[4,3],[0,2]], 4:[[0,5],[5,2]], 5:[[1,4],[4,3]], 6:[[0,4]]},
  gospel: {0:[[1,3],[5,3],[3,3],[4,2]], 1:[[4,5],[3,1]], 2:[[5,3],[1,2]], 3:[[4,4],[0,2]], 4:[[0,5],[5,3]], 5:[[3,3],[4,3],[1,2]], 6:[[0,4]]},
  folk:   {0:[[3,4],[4,3],[5,3]], 1:[[4,3],[0,2]], 2:[[5,3],[0,1]], 3:[[0,4],[4,3]], 4:[[0,5],[3,2]], 5:[[3,4],[4,2],[0,1]], 6:[[0,4]]}
};

const BLUES_8  = [0,0,3,0,4,3,0,4];
const BLUES_12 = [0,0,0,0,3,3,0,0,4,3,0,4];

function nota(indiceBase, semitons){
  return NOTAS[(indiceBase + semitons + 120) % 12];
}

function gerarAcorde(tomIndex, grauInfo, estilo){
  const raiz = nota(tomIndex, grauInfo.grau);
  let sufixo = grauInfo.qual;
  const ext = EXTENSOES[estilo];
  if (ext && Math.random() < 0.7 && ext[grauInfo.qual] !== undefined){
    sufixo = ext[grauInfo.qual];
  }
  return raiz + sufixo;
}

function gerarRoman(idxGrau, escala){
  return escala === 'maior' ? ROMANOS_MAIOR[idxGrau] : ROMANOS_MENOR[idxGrau];
}

function escolherPeso(opcoes){
  const total = opcoes.reduce((s,o) => s + o[1], 0);
  let r = Math.random() * total;
  for (const [deg, peso] of opcoes){
    if (r < peso) return deg;
    r -= peso;
  }
  return opcoes[0][0];
}

function gerarSequenciaDegraus(estilo, qtd){
  if (estilo === 'blues'){
    if (qtd <= 8) return BLUES_8.slice(0, qtd);
    return BLUES_12.slice(0, qtd > 12 ? 12 : qtd);
  }
  const tabela = TRANSICOES[estilo];
  const seq = [0];
  for (let i = 1; i < qtd; i++){
    if (i === qtd - 1){ seq.push(0); continue; }
    const atual = seq[seq.length - 1];
    const opcoes = tabela[atual] || [[0,1]];
    seq.push(escolherPeso(opcoes));
  }
  return seq;
}

document.getElementById('gerar').addEventListener('click', () => {
  const estilo = document.getElementById('estilo').value;
  const escala = document.getElementById('escala').value;
  const tom = document.getElementById('tom').value;
  const qtd = parseInt(document.getElementById('qtd').value, 10);
  const tomIndex = NOTAS.indexOf(tom);
  const escalaGraus = ESCALAS[escala];

  const sequencia = gerarSequenciaDegraus(estilo, qtd);
  const acordes = sequencia.map(idx => gerarAcorde(tomIndex, escalaGraus[idx], estilo));
  const romanos = sequencia.map(idx => gerarRoman(idx, escala));

  document.getElementById('resultado').innerHTML = `
    <div class="label">Progressão em ${tom} ${escala} — estilo ${estilo} (${qtd} acordes)</div>
    <div class="chords">${acordes.map(a => `<div class="chord">${a}</div>`).join('')}</div>
    <div class="roman">${romanos.join(' - ')}</div>
  `;
});
</script>
</body>
</html>
