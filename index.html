<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de Progressão de Acordes Ultra Pro</title>
<style>
  :root{
    --card:#1a1d24;
    --accent:#7c5cff;
    --accent2:#22d3ee;
    --text:#f2f2f5;
    --muted:#9aa0ab;
    --border:#2a2e38;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    background:linear-gradient(160deg,#0f1115,#171a21);
    color:var(--text);
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:24px 16px;
  }
  .app{ width:100%; max-width:500px; }
  h1{ font-size:1.4rem; text-align:center; margin-bottom:4px; }
  p.subtitle{ text-align:center; color:var(--muted); font-size:0.85rem; margin:0 0 20px; }
  .card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:16px;
    padding:20px;
    margin-bottom:16px;
  }
  label{ display:block; font-size:0.8rem; color:var(--muted); margin:14px 0 6px; }
  label:first-child{ margin-top:0; }
  select, input[type="number"]{
    width:100%; padding:12px; border-radius:10px;
    border:1px solid var(--border); background:#12151c; color:var(--text);
    font-size:1rem; appearance:none; -webkit-appearance:none;
  }
  select:focus, input:focus{ outline:none; border-color:var(--accent); }
  
  .controls-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .checkbox-group{
    margin-top:16px;
    padding:12px;
    background:#12151c;
    border-radius:10px;
    border:1px solid var(--border);
  }
  .checkbox-group legend{
    font-size:0.8rem;
    color:var(--muted);
    padding:0 4px;
  }
  .checkbox-item{
    display:flex;
    align-items:center;
    gap:8px;
    font-size:0.85rem;
    margin-top:8px;
    cursor:pointer;
  }
  .checkbox-item input{ accent-color:var(--accent); cursor:pointer; }

  button#gerar{
    width:100%; margin-top:22px; padding:15px; border:none; border-radius:12px;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    color:#fff; font-size:1.05rem; font-weight:600; cursor:pointer;
    transition:transform .12s ease, opacity .12s ease;
  }
  button#gerar:active{ transform:scale(0.97); opacity:0.9; }
  #resultado{ text-align:center; }
  .label{ font-size:0.88rem; color:var(--muted); margin-bottom:10px; }
  .chords{ display:flex; flex-wrap:wrap; justify-content:center; gap:8px; margin-bottom:10px; }
  .chord{
    background:#12151c; border:1px solid var(--border); border-radius:10px;
    padding:10px 14px; font-size:1.1rem; font-weight:700; min-width:52px; text-align:center;
    cursor:pointer; transition:border-color 0.2s, background 0.2s;
  }
  .chord:hover{ border-color:var(--accent2); }
  .chord.ativo{ border-color:var(--accent); background:#252b3b; }
  .roman{ font-size:0.75rem; color:var(--muted); margin-bottom:12px; }
  .empty{ color:var(--muted); font-size:0.9rem; padding:20px 0; }
  
  canvas#visualizer {
    width: 100%;
    height: 60px;
    background: #12151c;
    border-radius: 8px;
    margin-bottom: 12px;
    border: 1px solid var(--border);
  }

  .transpor-container {
    display: flex;
    gap: 8px;
    justify-content: center;
    align-items: center;
    margin: 12px 0;
    font-size: 0.8rem;
    color: var(--muted);
  }

  .acoes{ display:flex; gap:8px; justify-content:center; flex-wrap:wrap; }
  .acoes button, .transpor-container button{
    font-size:0.8rem; padding:8px 12px; border-radius:8px; border:1px solid var(--border);
    background:#12151c; color:var(--text); cursor:pointer;
  }
  .acoes button:active, .transpor-container button:active{ transform:scale(0.97); }
  
  .tabs{ display:flex; gap:8px; border-bottom:1px solid var(--border); margin-bottom:12px; }
  .tabs button{
    flex:1; border:none; background:none; padding:8px; font-size:0.85rem;
    color:var(--muted); border-bottom:2px solid transparent; cursor:pointer;
  }
  .tabs button.ativo{ color:var(--text); border-bottom-color:var(--accent); }
  .item-lista{
    display:flex; align-items:center; justify-content:space-between;
    padding:8px 10px; border:1px solid var(--border); border-radius:8px;
    margin-bottom:6px; cursor:pointer; background:#12151c;
  }
  .item-lista:hover{ border-color:var(--accent); }
  .item-lista .info{ font-size:0.8rem; }
  .item-lista .sub{ color:var(--muted); font-size:0.7rem; display:block; }
  .item-lista .icone{ color:var(--muted); font-size:1rem; }
  .vazio{ font-size:0.8rem; color:var(--muted); text-align:center; padding:10px 0; }
  footer{ text-align:center; color:var(--muted); font-size:0.75rem; margin-top:20px; }
</style>
</head>
<body>
<div class="app">
  <h1>🎸 Gerador de Progressão Ultra</h1>
  <p class="subtitle">Composição Harmônica e Áudio Sintetizado</p>

  <div class="card">
    <label for="estilo">Estilo Musical</label>
    <select id="estilo">
      <option value="pop">Pop</option>
      <option value="rock">Rock</option>
      <option value="jazz">Jazz</option>
      <option value="blues">Blues</option>
      <option value="bossa">Bossa Nova / MPB</option>
      <option value="samba">Samba / Pagode</option>
      <option value="lofi">Lo-Fi / Chill</option>
      <option value="reggae">Reggae</option>
      <option value="metal">Metal</option>
      <option value="gospel">Gospel</option>
      <option value="folk">Folk</option>
      <option value="indie">Indie</option>
      <option value="britpop">Britpop</option>
      <option value="grunge">Grunge</option>
      <option value="mpb_romantica">MPB Romântica</option>
      <option value="bluesrock">Blues Rock</option>
    </select>

    <label for="escala">Escala / Modo</label>
    <select id="escala">
      <option value="maior">Maior (Jônio)</option>
      <option value="menor">Menor (Eólio)</option>
      <option value="menor_harmonica">Menor Harmônica</option>
      <option value="menor_melodica">Menor Melódica</option>
      <option value="dorico">Modo Dórico</option>
      <option value="mixolidio">Modo Mixolídio</option>
      <option value="penta_maior">Pentatônica Maior</option>
      <option value="penta_menor">Pentatônica Menor</option>
      <option value="blues_escala">Escala de Blues</option>
    </select>

    <label for="tom">Tom (Tônica)</label>
    <select id="tom">
      <option>C</option><option>C#</option><option>D</option><option>D#</option>
      <option>E</option><option>F</option><option>F#</option><option>G</option>
      <option>G#</option><option>A</option><option>A#</option><option>B</option>
    </select>

    <div class="controls-grid">
      <div>
        <label for="qtd">Qtd. Acordes</label>
        <select id="qtd">
          <option value="2">2 (Vamp)</option>
          <option value="4" selected>4</option>
          <option value="6">6</option>
          <option value="8">8</option>
          <option value="12">12</option>
        </select>
      </div>
      <div>
        <label for="bpm">Andamento (BPM)</label>
        <input type="number" id="bpm" value="100" min="60" max="180">
      </div>
    </div>

    <label for="ritmo">Estilo de Ritmo</label>
    <select id="ritmo">
      <option value="padrao">Padrão (4/4 Bloco)</option>
      <option value="arpejo">Arpejado (Notas Suaves)</option>
      <option value="bossa">Bossa Nova / Swung</option>
      <option value="reggae">Reggae (Sincopado/Offbeat)</option>
    </select>

    <fieldset class="checkbox-group">
      <legend>Acompanhamento & Recursos</legend>
      <label class="checkbox-item">
        <input type="checkbox" id="chk-bateria" checked> Acompanhamento de Bateria Simples
      </label>
      <label class="checkbox-item">
        <input type="checkbox" id="chk-inversoes" checked> Inversões de Acordes (C/E, G/B)
      </label>
      <label class="checkbox-item">
        <input type="checkbox" id="chk-emprestimo" checked> Empréstimo Harmônico (iv, ♭VI, ♭VII)
      </label>
      <label class="checkbox-item">
        <input type="checkbox" id="chk-dominantes" checked> Dominantes Secundários (V7/X)
      </label>
    </fieldset>

    <button id="gerar">🎲 Gerar Progressão</button>
  </div>

  <div class="card" id="resultado">
    <div class="empty">Clique em "Gerar" para começar 🎶</div>
  </div>
  
  <div class="card" id="campoHarmonico"></div>

  <div class="card">
    <div class="tabs">
      <button id="tab-historico" class="ativo">Histórico</button>
      <button id="tab-favoritos">Favoritos</button>
    </div>
    <div id="lista-historico"></div>
    <div id="lista-favoritos" style="display:none;"></div>
  </div>

  <footer>Inspirações ilimitadas para suas composições.</footer>
</div>

<script>
const NOTAS = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const NOTAS_BEMOL = ['C','Db','D','Eb','E','F','Gb','G','Ab','A','Bb','B'];

const FREQUENCIAS = {
  'C': 261.63, 'C#': 277.18, 'Db': 277.18, 'D': 293.66, 'D#': 311.13, 'Eb': 311.13,
  'E': 329.63, 'F': 349.23, 'F#': 369.99, 'Gb': 369.99, 'G': 392.00,
  'G#': 415.30, 'Ab': 415.30, 'A': 440.00, 'A#': 466.16, 'Bb': 466.16, 'B': 493.88
};

const CONFIG_ESTILOS = {
  jazz:          { extensoes: {'':'maj7', 'm':'m7', 'dim':'m7b5', 'aug':'maj7#5'}, probInversao: 0.4, probEmprestimo: 0.3 },
  bossa:         { extensoes: {'':'maj7', 'm':'m7', 'dim':'m7b5'}, probInversao: 0.5, probEmprestimo: 0.4 },
  samba:         { extensoes: {'':'6', 'm':'m7', 'dim':'m7b5'}, probInversao: 0.3, probEmprestimo: 0.3 },
  lofi:          { extensoes: {'':'maj7', 'm':'m9', 'dim':'m7b5'}, probInversao: 0.4, probEmprestimo: 0.3 },
  gospel:        { extensoes: {'':'maj7', 'm':'m7', 'dim':'m7b5'}, probInversao: 0.5, probEmprestimo: 0.4 },
  blues:         { extensoes: {'':'7', 'm':'m7', 'dim':'dim7'}, probInversao: 0.1, probEmprestimo: 0.1 },
  pop:           { extensoes: {'':'', 'm':'m'}, probInversao: 0.3, probEmprestimo: 0.25 },
  rock:          { extensoes: {'':'', 'm':'m'}, probInversao: 0.2, probEmprestimo: 0.2 },
  folk:          { extensoes: {'':'', 'm':'m'}, probInversao: 0.2, probEmprestimo: 0.15 },
  indie:         { extensoes: {'':'add9', 'm':'m'}, probInversao: 0.3, probEmprestimo: 0.2 },
  britpop:       { extensoes: {'':'sus2', 'm':'m'}, probInversao: 0.3, probEmprestimo: 0.2 },
  reggae:        { extensoes: {'':'6', 'm':'m'}, probInversao: 0.1, probEmprestimo: 0.1 },
  metal:         { extensoes: {'':'5', 'm':'5'}, probInversao: 0.1, probEmprestimo: 0.1 },
  grunge:        { extensoes: {'':'', 'm':'m'}, probInversao: 0.2, probEmprestimo: 0.3 },
  mpb_romantica: { extensoes: {'':'maj7', 'm':'m7', 'dim':'m7b5'}, probInversao: 0.4, probEmprestimo: 0.4 },
  bluesrock:     { extensoes: {'':'7', 'm':'m7'}, probInversao: 0.2, probEmprestimo: 0.2 }
};

const ESCALAS = {
  maior: [
    {grau:0, qual:''},{grau:2, qual:'m'},{grau:4, qual:'m'},{grau:5, qual:''},
    {grau:7, qual:''},{grau:9, qual:'m'},{grau:11, qual:'dim'}
  ],
  menor: [
    {grau:0, qual:'m'},{grau:2, qual:'dim'},{grau:3, qual:''},{grau:5, qual:'m'},
    {grau:7, qual:'m'},{grau:8, qual:''},{grau:10, qual:''}
  ],
  menor_harmonica: [
    {grau:0, qual:'m'},{grau:2, qual:'dim'},{grau:3, qual:'aug'},{grau:5, qual:'m'},
    {grau:7, qual:''},{grau:8, qual:''},{grau:11, qual:'dim'}
  ],
  menor_melodica: [
    {grau:0, qual:'m'},{grau:2, qual:'m'},{grau:3, qual:'aug'},{grau:5, qual:''},
    {grau:7, qual:''},{grau:9, qual:'dim'},{grau:11, qual:'dim'}
  ],
  dorico: [
    {grau:0, qual:'m'},{grau:2, qual:'m'},{grau:3, qual:''},{grau:5, qual:''},
    {grau:7, qual:'m'},{grau:9, qual:'dim'},{grau:10, qual:''}
  ],
  mixolidio: [
    {grau:0, qual:''},{grau:2, qual:'m'},{grau:4, qual:'dim'},{grau:5, qual:''},
    {grau:7, qual:'m'},{grau:9, qual:'m'},{grau:10, qual:''}
  ],
  penta_maior: [
    {grau:0, qual:''},{grau:2, qual:'m'},{grau:4, qual:'m'},{grau:7, qual:''},{grau:9, qual:'m'}
  ],
  penta_menor: [
    {grau:0, qual:'m'},{grau:3, qual:''},{grau:5, qual:'m'},{grau:7, qual:'m'},{grau:10, qual:''}
  ],
  blues_escala: [
    {grau:0, qual:'7'},
    {grau:5, qual:'7'},
    {grau:7, qual:'7'},
    {grau:3, qual:'7'},
    {grau:10, qual:'7'}
  ]
};

const ROMANOS = {
  maior: ['I','ii','iii','IV','V','vi','vii°'],
  menor: ['i','ii°','III','iv','v','VI','VII'],
  menor_harmonica: ['i','ii°','III+','iv','V','VI','vii°'],
  menor_melodica: ['i','ii','III+','IV','V','vi°','vii°'],
  dorico: ['i','ii','III','IV','v','vi°','VII'],
  mixolidio: ['I','ii','iii°','IV','v','vi','♭VII'],
  penta_maior: ['I','ii','iii','V','vi'],
  penta_menor: ['i','III','iv','v','VII'],
  blues_escala: ['I7','IV7','V7','♭III7','♭VII7']
};

let itemAtual = null; 
let loopAtivo = false;
let timeoutsAgendados = [];

function nota(indiceBase, semitons){
  return NOTAS[(indiceBase + semitons + 120) % 12];
}

function transporNota(nomeNota, semitons) {
  let idx = NOTAS.indexOf(nomeNota);
  if (idx === -1) idx = NOTAS_BEMOL.indexOf(nomeNota);
  if (idx === -1) return nomeNota;
  return NOTAS[(idx + semitons + 120) % 12];
}

function transporAcorde(acorde, semitons) {
  const partes = acorde.split('/');
  let principal = partes[0];
  let baixo = partes[1];

  principal = principal.replace(/^[A-G][#b]?/, match => transporNota(match, semitons));
  if (baixo) {
    baixo = transporNota(baixo, semitons);
    return `${principal}/${baixo}`;
  }
  return principal;
}

function transporProgressao(semitons) {
  if (!itemAtual) return;
  itemAtual.tom = transporNota(itemAtual.tom, semitons);
  itemAtual.acordes = itemAtual.acordes.map(a => transporAcorde(a, semitons));
  renderResultado(itemAtual);
}

function gerarAcorde(tomIndex, grauInfo, estilo){
  if (!grauInfo) return '';
  
  const raiz = nota(tomIndex, grauInfo.grau);
  let sufixo = grauInfo.qual;
  
  const cfg = CONFIG_ESTILOS[estilo] || CONFIG_ESTILOS.pop;
  if (cfg.extensoes && cfg.extensoes[grauInfo.qual] !== undefined && Math.random() < 0.7){
    sufixo = cfg.extensoes[grauInfo.qual];
  }

  return raiz + sufixo;
}

function aplicarInversao(acorde){
  if (acorde.includes('/') || acorde.includes('5')) return acorde;
  
  const match = acorde.match(/^[A-G][#b]?/);
  if (!match) return acorde;

  const raiz = match[0];
  let idxRaiz = NOTAS.indexOf(raiz);
  if (idxRaiz === -1) idxRaiz = NOTAS_BEMOL.indexOf(raiz);

  const ehMenor = acorde.includes('m') && !acorde.includes('maj');
  const semitonsTerca = ehMenor ? 3 : 4;
  
  const terca = ehMenor ? NOTAS_BEMOL[(idxRaiz + semitonsTerca) % 12] : NOTAS[(idxRaiz + semitonsTerca) % 12];
  return `${acorde}/${terca}`;
}

function aplicarEmprestimoHarmonico(tomIndex, escala){
  if (escala !== 'maior') return null;

  const opcoes = [
    { roman: 'iv', semitons: 5, sufixo: 'm' },
    { roman: '♭VI', semitons: 8, sufixo: '' },
    { roman: '♭VII', semitons: 10, sufixo: '' }
  ];

  const esc = opcoes[Math.floor(Math.random() * opcoes.length)];
  const raiz = NOTAS_BEMOL[(tomIndex + esc.semitons) % 12];
  return { acorde: raiz + esc.sufixo, roman: esc.roman };
}

function gerarDominanteSecundario(acordeAlvo){
  const match = acordeAlvo.match(/^[A-G][#b]?/);
  if (!match) return null;

  const raizAlvo = match[0];
  let idxAlvo = NOTAS.indexOf(raizAlvo);
  if(idxAlvo === -1) idxAlvo = NOTAS_BEMOL.indexOf(raizAlvo);

  const raizDom = NOTAS[(idxAlvo + 7) % 12];
  return { acorde: raizDom + '7', roman: 'V7' };
}

function gerarRoman(idxGrau, escala){
  const arrayRomanos = ROMANOS[escala] || ROMANOS.maior;
  return arrayRomanos[idxGrau % arrayRomanos.length] || '';
}

function gerarCampoHarmonico(tomIndex, escala, estilo){
  const graus = ESCALAS[escala] || ESCALAS.maior;
  const cfg = CONFIG_ESTILOS[estilo] || CONFIG_ESTILOS.pop;

  const triades = graus.map(g => nota(tomIndex, g.grau) + g.qual);
  const tetrades = graus.map(g => {
    const raiz = nota(tomIndex, g.grau);
    const ext = cfg.extensoes ? (cfg.extensoes[g.qual] || g.qual) : g.qual;
    return raiz + ext;
  });

  return { triades, tetrades };
}

function gerarSequenciaDegraus(estilo, qtd, tamanhoEscala){
  if (tamanhoEscala === 0) return [];
  
  const progressosComuns = {
    pop: [[0,4,5,3], [5,3,0,4], [0,5,3,4], [3,0,4,5]],
    rock: [[0,4,3,0], [5,3,0,4], [4,3,0,0], [0,3,4,0]],
    blues: [
      [0,1,0,2],       // I7 - IV7 - I7 - V7
      [0,1,2,1],       // I7 - IV7 - V7 - IV7
      [0,0,1,2],       // I7 - I7 - IV7 - V7
      [0,1,0,0,1,1,0,0,2,1,0,2] // 12 Bar Blues clássico
    ],
    jazz: [[1,4,0,5], [2,5,1,4], [5,1,4,0]],
    bossa: [[0,1,4,0], [5,1,4,0], [3,1,4,0]]
  };

  const base = progressosComuns[estilo] || progressosComuns.pop;
  const modelo = base[Math.floor(Math.random() * base.length)];
  const seq = [];

  while (seq.length < qtd){
    seq.push(...modelo.map(idx => idx % tamanhoEscala));
  }

  return seq.slice(0, qtd);
}

// Web Audio API
let audioCtx = null;
let analyser = null;
let animCanvasId = null;

function inicializarAudio() {
  if(!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    analyser.connect(audioCtx.destination);
  }
}

function tocarNotaADSR(freq, tempoInicio, duracao = 1.2) {
  inicializarAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = 'triangle';
  osc.frequency.value = freq;

  const attack = 0.03;
  const decay = 0.2;
  const sustainLevel = 0.4;
  const release = 0.4;

  const peekVol = 0.15;
  const sustainVol = peekVol * sustainLevel;

  gain.gain.setValueAtTime(0, tempoInicio);
  gain.gain.linearRampToValueAtTime(peekVol, tempoInicio + attack);
  gain.gain.linearRampToValueAtTime(sustainVol, tempoInicio + attack + decay);
  gain.gain.setValueAtTime(sustainVol, tempoInicio + duracao - release);
  gain.gain.exponentialRampToValueAtTime(0.0001, tempoInicio + duracao);

  osc.connect(gain);
  gain.connect(analyser);

  osc.start(tempoInicio);
  osc.stop(tempoInicio + duracao);
}

function tocarBrumbo(tempoInicio) {
  inicializarAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  
  osc.frequency.setValueAtTime(130, tempoInicio);
  osc.frequency.exponentialRampToValueAtTime(0.01, tempoInicio + 0.15);

  gain.gain.setValueAtTime(0.25, tempoInicio);
  gain.gain.exponentialRampToValueAtTime(0.001, tempoInicio + 0.15);

  osc.connect(gain);
  gain.connect(analyser);

  osc.start(tempoInicio);
  osc.stop(tempoInicio + 0.15);
}

function tocarChimbal(tempoInicio) {
  inicializarAudio();
  const bufferSize = audioCtx.sampleRate * 0.04;
  const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
  const data = buffer.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    data[i] = Math.random() * 2 - 1;
  }

  const noise = audioCtx.createBufferSource();
  noise.buffer = buffer;

  const filter = audioCtx.createBiquadFilter();
  filter.type = 'highpass';
  filter.frequency.value = 6000;

  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(0.04, tempoInicio);
  gain.gain.exponentialRampToValueAtTime(0.001, tempoInicio + 0.04);

  noise.connect(filter);
  filter.connect(gain);
  gain.connect(analyser);

  noise.start(tempoInicio);
}

function renderVisualizer() {
  const canvas = document.getElementById('visualizer');
  if(!canvas || !analyser) return;

  const ctx = canvas.getContext('2d');
  const bufferLength = analyser.frequencyBinCount;
  const dataArray = new Uint8Array(bufferLength);

  function draw() {
    animCanvasId = requestAnimationFrame(draw);
    analyser.getByteTimeDomainData(dataArray);

    ctx.fillStyle = '#12151c';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.lineWidth = 2;
    ctx.strokeStyle = '#22d3ee';
    ctx.beginPath();

    const sliceWidth = canvas.width * 1.0 / bufferLength;
    let x = 0;

    for (let i = 0; i < bufferLength; i++) {
      const v = dataArray[i] / 128.0;
      const y = v * canvas.height / 2;

      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);

      x += sliceWidth;
    }

    ctx.lineTo(canvas.width, canvas.height / 2);
    ctx.stroke();
  }

  if(!animCanvasId) draw();
}

function tocarAcorde(nomeAcorde, delayBase = 0, estiloRitmo = 'padrao'){
  inicializarAudio();
  renderVisualizer();
  
  const notaBaseMatch = nomeAcorde.match(/^[A-G][#b]?/);
  if(!notaBaseMatch) return;
  
  const notaBase = notaBaseMatch[0];
  const freqBase = FREQUENCIAS[notaBase] || 261.63;
  
  let intervalos = [0, 4, 7]; 
  if(nomeAcorde.includes('m') && !nomeAcorde.includes('maj')) intervalos = [0, 3, 7];
  if(nomeAcorde.includes('dim') || nomeAcorde.includes('m7b5')) intervalos = [0, 3, 6];
  if(nomeAcorde.includes('aug')) intervalos = [0, 4, 8];
  if(nomeAcorde.includes('5')) intervalos = [0, 7];

  if (nomeAcorde.includes('maj7')) intervalos.push(11);
  else if (nomeAcorde.includes('7')) intervalos.push(10);
  if (nomeAcorde.includes('m9') || nomeAcorde.includes('add9') || nomeAcorde.includes('9')) intervalos.push(14);
  if (nomeAcorde.includes('6')) intervalos.push(9);

  const tempoInicioAbsoluto = audioCtx.currentTime + delayBase;

  if (estiloRitmo === 'arpejo') {
    intervalos.forEach((semitons, idx) => {
      const freq = freqBase * Math.pow(2, semitons / 12);
      tocarNotaADSR(freq, tempoInicioAbsoluto + (idx * 0.12), 1.0);
    });
  } else {
    intervalos.forEach((semitons, idx) => {
      const freq = freqBase * Math.pow(2, semitons / 12);
      const atrasoNota = idx * 0.03; 
      tocarNotaADSR(freq, tempoInicioAbsoluto + atrasoNota, 1.2);
    });
  }
}

function pararPlayback() {
  loopAtivo = false;
  timeoutsAgendados.forEach(clearTimeout);
  timeoutsAgendados = [];
  if (animCanvasId) {
    cancelAnimationFrame(animCanvasId);
    animCanvasId = null;
  }
}

function tocarProgressao(acordes, emLoop = false){
  pararPlayback();
  inicializarAudio();
  
  if (emLoop) loopAtivo = true;

  const bpm = parseInt(document.getElementById('bpm').value, 10) || 100;
  const ritmo = document.getElementById('ritmo').value;
  const usarBateria = document.getElementById('chk-bateria').checked;
  
  const duracaoCompasso = (60 / bpm) * 2; 
  const tempoTotal = acordes.length * duracaoCompasso;

  acordes.forEach((acorde, index) => {
    let delay = index * duracaoCompasso;

    const tHighlight = setTimeout(() => {
      document.querySelectorAll('.chord').forEach((el, i) => {
        if (i === index) el.classList.add('ativo');
        else el.classList.remove('ativo');
      });
    }, delay * 1000);
    timeoutsAgendados.push(tHighlight);

    if (ritmo === 'reggae') {
      delay += (duracaoCompasso * 0.25);
      tocarAcorde(acorde, delay, ritmo);
    } else if (ritmo === 'bossa') {
      tocarAcorde(acorde, delay, ritmo);
      tocarAcorde(acorde, delay + (duracaoCompasso * 0.375), ritmo);
    } else {
      tocarAcorde(acorde, delay, ritmo);
    }

    if (usarBateria) {
      const baseT = index * duracaoCompasso;
      tocarBrumbo(audioCtx.currentTime + baseT);
      tocarChimbal(audioCtx.currentTime + baseT + (duracaoCompasso * 0.25));
      tocarChimbal(audioCtx.currentTime + baseT + (duracaoCompasso * 0.50));
      tocarChimbal(audioCtx.currentTime + baseT + (duracaoCompasso * 0.75));
    }
  });

  const tFim = setTimeout(() => {
    document.querySelectorAll('.chord').forEach(el => el.classList.remove('ativo'));
    if (loopAtivo) {
      tocarProgressao(acordes, true);
    }
  }, tempoTotal * 1000);
  
  timeoutsAgendados.push(tFim);
}

// LocalStorage
const LS_HIST = 'progressoes_historico_v5';
const LS_FAV = 'progressoes_favoritos_v5';
function carregar(chave){ try{ return JSON.parse(localStorage.getItem(chave)) || []; }catch(e){ return []; } }
function salvar(chave,dados){ localStorage.setItem(chave, JSON.stringify(dados)); }

let historico = carregar(LS_HIST);
let favoritos = carregar(LS_FAV);

function idDe(item){ return item.tom+'|'+item.escala+'|'+item.estilo+'|'+item.acordes.join(','); }
function ehFavorito(item){ return favoritos.some(f => idDe(f)===idDe(item)); }

function renderResultado(item){
  itemAtual = item;
  pararPlayback();

  const resDiv = document.getElementById('resultado');
  resDiv.textContent = ''; 

  const canvas = document.createElement('canvas');
  canvas.id = 'visualizer';
  canvas.width = 400;
  canvas.height = 60;

  const label = document.createElement('div');
  label.className = 'label';
  label.textContent = `Progressão em ${item.tom} ${item.escala} — ${item.estilo} (${item.acordes.length} acordes)`;

  const chordsDiv = document.createElement('div');
  chordsDiv.className = 'chords';

  item.acordes.forEach(a => {
    const chord = document.createElement('div');
    chord.className = 'chord';
    chord.textContent = a;
    chord.addEventListener('click', () => tocarAcorde(a));
    chordsDiv.appendChild(chord);
  });

  const romanDiv = document.createElement('div');
  romanDiv.className = 'roman';
  romanDiv.textContent = item.romanos.join(' - ');

  const transporDiv = document.createElement('div');
  transporDiv.className = 'transpor-container';
  
  const spanTrans = document.createElement('span');
  spanTrans.textContent = 'Transpor tom: ';
  
  const btnDown = document.createElement('button');
  btnDown.textContent = '♭ -1 Semitom';
  btnDown.onclick = () => transporProgressao(-1);

  const btnUp = document.createElement('button');
  btnUp.textContent = '♯ +1 Semitom';
  btnUp.onclick = () => transporProgressao(1);

  transporDiv.appendChild(spanTrans);
  transporDiv.appendChild(btnDown);
  transporDiv.appendChild(btnUp);

  const acoes = document.createElement('div');
  acoes.className = 'acoes';

  const btnTocar = document.createElement('button');
  btnTocar.textContent = '▶ Ouvir';
  btnTocar.onclick = () => tocarProgressao(item.acordes, false);

  const btnLoop = document.createElement('button');
  btnLoop.textContent = '🔁 Loop (Jam)';
  btnLoop.onclick = () => tocarProgressao(item.acordes, true);

  const btnParar = document.createElement('button');
  btnParar.textContent = '⏹ Parar';
  btnParar.onclick = () => pararPlayback();

  const btnCopiar = document.createElement('button');
  btnCopiar.textContent = '📋 Copiar';
  btnCopiar.onclick = () => {
    navigator.clipboard.writeText(item.acordes.join(' - '));
    btnCopiar.textContent = '✅ Copiado';
    setTimeout(() => { btnCopiar.textContent = '📋 Copiar'; }, 1500);
  };

  const btnFav = document.createElement('button');
  btnFav.textContent = ehFavorito(item) ? '⭐ Favoritado' : '☆ Favoritar';
  btnFav.onclick = () => {
    if (ehFavorito(item)){
      favoritos = favoritos.filter(f => idDe(f)!==idDe(item));
    } else {
      favoritos.unshift(item);
    }
    salvar(LS_FAV, favoritos);
    renderResultado(item);
    renderListas();
  };

  acoes.appendChild(btnTocar);
  acoes.appendChild(btnLoop);
  acoes.appendChild(btnParar);
  acoes.appendChild(btnCopiar);
  acoes.appendChild(btnFav);

  resDiv.appendChild(canvas);
  resDiv.appendChild(label);
  resDiv.appendChild(chordsDiv);
  resDiv.appendChild(romanDiv);
  resDiv.appendChild(transporDiv);
  resDiv.appendChild(acoes);
}

function linhaItem(item, mostrarRemover){
  const div = document.createElement('div');
  div.className = 'item-lista';

  const info = document.createElement('div');
  info.className = 'info';

  const mainSpan = document.createElement('span');
  mainSpan.textContent = item.acordes.join(' - ');

  const subSpan = document.createElement('span');
  subSpan.className = 'sub';
  subSpan.textContent = `${item.tom} ${item.escala} · ${item.estilo}`;

  info.appendChild(mainSpan);
  info.appendChild(subSpan);

  const icone = document.createElement('span');
  icone.className = 'icone';
  icone.textContent = mostrarRemover ? '✕' : (ehFavorito(item) ? '⭐' : '☆');

  icone.addEventListener('click', (e) => {
    e.stopPropagation();
    if (mostrarRemover){
      favoritos = favoritos.filter(f => idDe(f)!==idDe(item));
    } else {
      if (ehFavorito(item)){
        favoritos = favoritos.filter(f => idDe(f)!==idDe(item));
      } else {
        favoritos.unshift(item);
      }
    }
    salvar(LS_FAV, favoritos);
    renderListas();
    renderResultado(item);
  });

  div.appendChild(info);
  div.appendChild(icone);
  div.addEventListener('click', () => renderResultado(item));
  return div;
}

function renderListas(){
  const listaHist = document.getElementById('lista-historico');
  const listaFav = document.getElementById('lista-favoritos');
  listaHist.textContent = '';
  listaFav.textContent = '';

  if (historico.length === 0){
    const vazio = document.createElement('div');
    vazio.className = 'vazio';
    vazio.textContent = 'Nenhuma progressão gerada ainda.';
    listaHist.appendChild(vazio);
  } else {
    historico.slice(0,10).forEach(item => listaHist.appendChild(linhaItem(item, false)));
  }

  if (favoritos.length === 0){
    const vazio = document.createElement('div');
    vazio.className = 'vazio';
    vazio.textContent = 'Nenhum favorito ainda.';
    listaFav.appendChild(vazio);
  } else {
    favoritos.forEach(item => listaFav.appendChild(linhaItem(item, true)));
  }
}

document.getElementById('tab-historico').addEventListener('click', () => {
  document.getElementById('lista-historico').style.display = 'block';
  document.getElementById('lista-favoritos').style.display = 'none';
  document.getElementById('tab-historico').classList.add('ativo');
  document.getElementById('tab-favoritos').classList.remove('ativo');
});
document.getElementById('tab-favoritos').addEventListener('click', () => {
  document.getElementById('lista-favoritos').style.display = 'block';
  document.getElementById('lista-historico').style.display = 'none';
  document.getElementById('tab-favoritos').classList.add('ativo');
  document.getElementById('tab-historico').classList.remove('ativo');
});

document.getElementById('gerar').addEventListener('click', () => {
  const estilo = document.getElementById('estilo').value;
  const escala = document.getElementById('escala').value;
  const tom = document.getElementById('tom').value;
  const qtd = parseInt(document.getElementById('qtd').value, 10);
  
  const permitirInversoes = document.getElementById('chk-inversoes').checked;
  const permitirEmprestimo = document.getElementById('chk-emprestimo').checked;
  const permitirDominantes = document.getElementById('chk-dominantes').checked;

  const tomIndex = NOTAS.indexOf(tom);
  const escalaGraus = ESCALAS[escala] || ESCALAS.maior;
  const cfgEstilo = CONFIG_ESTILOS[estilo] || CONFIG_ESTILOS.pop;

  const sequencia = gerarSequenciaDegraus(estilo, qtd, escalaGraus.length);
  
  let acordes = [];
  let romanos = [];

  for(let i = 0; i < sequencia.length; i++){
    if(acordes.length >= qtd) break;

    const idx = sequencia[i];
    let acorde = gerarAcorde(tomIndex, escalaGraus[idx], estilo);
    let roman = gerarRoman(idx, escala);

    if(permitirDominantes && Math.random() < 0.25 && (acordes.length + 2 <= qtd) && idx !== 0){
      const domSec = gerarDominanteSecundario(acorde);
      if(domSec){
        acordes.push(domSec.acorde);
        romanos.push(`V7/${roman}`);
      }
    }

    if(permitirEmprestimo && escala === 'maior' && Math.random() < cfgEstilo.probEmprestimo){
      const emp = aplicarEmprestimoHarmonico(tomIndex, escala);
      if(emp){
        acorde = emp.acorde;
        roman = emp.roman;
      }
    }

    if(permitirInversoes && Math.random() < cfgEstilo.probInversao){
      acorde = aplicarInversao(acorde);
    }

    acordes.push(acorde);
    romanos.push(roman);
  }

  const item = { estilo, escala, tom, acordes, romanos, ts: Date.now() };
  
  historico.unshift(item);
  historico = historico.slice(0,10);
  salvar(LS_HIST, historico);

  renderResultado(item);

  const campoDiv = document.getElementById('campoHarmonico');
  campoDiv.textContent = '';
  
  const campoDados = gerarCampoHarmonico(tomIndex, escala, estilo);
  
  const tituloTriade = document.createElement('div');
  tituloTriade.className = 'label';
  tituloTriade.textContent = `Campo Harmônico Triádico (${escala})`;
  
  const divTriades = document.createElement('div');
  divTriades.className = 'chords';
  campoDados.triades.forEach(a => {
    const chord = document.createElement('div');
    chord.className = 'chord';
    chord.textContent = a;
    chord.onclick = () => tocarAcorde(a);
    divTriades.appendChild(chord);
  });

  const tituloTET = document.createElement('div');
  tituloTET.className = 'label';
  tituloTET.style.marginTop = '12px';
  tituloTET.textContent = `Campo Harmônico com Extensões (${estilo})`;

  const divTetrades = document.createElement('div');
  divTetrades.className = 'chords';
  campoDados.tetrades.forEach(a => {
    const chord = document.createElement('div');
    chord.className = 'chord';
    chord.textContent = a;
    chord.onclick = () => tocarAcorde(a);
    divTetrades.appendChild(chord);
  });

  campoDiv.appendChild(tituloTriade);
  campoDiv.appendChild(divTriades);
  campoDiv.appendChild(tituloTET);
  campoDiv.appendChild(divTetrades);

  renderListas();
});

renderListas();
</script>
